name: Refresh News Bot

on:
  schedule:
    - cron: '0 * * * *'     # Every hour on the hour (reliable on free accounts)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install feedparser

      - run: python bot.py

      - name: Commit fresh index.html
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Auto-refresh $(date)" --allow-empty || true
          git push
