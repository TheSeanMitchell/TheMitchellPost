name: Refresh News Bot
on:
  schedule:
    - cron: '0 * * * *'    # top of every hour
    - cron: '30 * * * *'   # bottom of every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install feedparser
      - run: python bot.py
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html feed.xml feed.json _headers
          git commit -m "Auto-refresh $(date -u)" --allow-empty || true
          git pull --rebase origin main
          git push
