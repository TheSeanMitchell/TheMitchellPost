name: Update News Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes (closest GitHub allows)
  workflow_dispatch:        # Manual test button

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install feedparser
      - run: python bot.py
      - name: Force update index.html
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Auto-update $(date)" --allow-empty || true
          git push
